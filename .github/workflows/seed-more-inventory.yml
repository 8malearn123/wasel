name: Seed cameras, laptops, tablets and batteries

on:
  workflow_dispatch:

jobs:
  seed:
    runs-on: ubuntu-latest
    steps:
      - name: Insert extra inventory via Supabase REST
        env:
          SUPA: https://ynwddyxzypbcftlevuam.supabase.co
          # Public anon key (already committed in .env) — RLS still applies
          ANON: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inlud2RkeXh6eXBiY2Z0bGV2dWFtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njk5MjE1OTQsImV4cCI6MjA4NTQ5NzU5NH0.PsNDqovuzo7NmTiwsH4swskkIF3FdMlBXjYUy3MJkyA
        run: |
          set -euo pipefail

          seed_merchant() {
            local TOKEN="$1" LABEL="$2"

            local BR MID BID
            BR=$(curl -sS "$SUPA/rest/v1/branches?select=id,merchant_id&is_active=eq.true&limit=1" \
              -H "apikey: $ANON" -H "Authorization: Bearer $TOKEN")
            MID=$(echo "$BR" | jq -r '.[0].merchant_id // empty')
            BID=$(echo "$BR" | jq -r '.[0].id // empty')
            if [ -z "$MID" ]; then echo "[$LABEL] no branch found: $BR"; return 1; fi

            jq --arg m "$MID" --arg b "$BID" 'map(. + {merchant_id:$m, branch_id:$b, status:"available"})' \
              devices-base.json > devices.json
            local RESP
            RESP=$(curl -sS -w "\nHTTP %{http_code}" -X POST \
              "$SUPA/rest/v1/devices?on_conflict=merchant_id,imei" \
              -H "apikey: $ANON" -H "Authorization: Bearer $TOKEN" \
              -H "Content-Type: application/json" \
              -H "Prefer: resolution=ignore-duplicates,return=minimal" \
              --data @devices.json)
            echo "[$LABEL] devices: $(echo "$RESP" | tail -1)"
            echo "$RESP" | grep -q "HTTP 201" || { echo "[$LABEL] devices insert failed: $RESP"; return 1; }

            # accessories table has no unique constraint on sku — check manually for idempotency
            local EXIST
            EXIST=$(curl -sS "$SUPA/rest/v1/accessories?sku=eq.ACC-009&select=id&limit=1" \
              -H "apikey: $ANON" -H "Authorization: Bearer $TOKEN")
            if [ "$(echo "$EXIST" | jq 'length')" != "0" ]; then
              echo "[$LABEL] battery accessories already present"
              return 0
            fi
            jq --arg m "$MID" --arg b "$BID" 'map(. + {merchant_id:$m, branch_id:$b})' \
              accessories-base.json > accessories.json
            RESP=$(curl -sS -w "\nHTTP %{http_code}" -X POST \
              "$SUPA/rest/v1/accessories" \
              -H "apikey: $ANON" -H "Authorization: Bearer $TOKEN" \
              -H "Content-Type: application/json" \
              -H "Prefer: return=minimal" \
              --data @accessories.json)
            echo "[$LABEL] accessories: $(echo "$RESP" | tail -1)"
            echo "$RESP" | grep -q "HTTP 201" || { echo "[$LABEL] accessories insert failed: $RESP"; return 1; }
          }

          jq -n '[
            {imei:"359871220045101", model:"iPad Pro 11 M4",      brand:"Apple",    storage:"256GB", color:"فضي",        condition:"new", category:"tablet", cost:3800, price:4399},
            {imei:"359871220045119", model:"iPad Air 11",         brand:"Apple",    storage:"128GB", color:"أزرق",       condition:"new", category:"tablet", cost:2100, price:2499},
            {imei:"359871220045127", model:"iPad 10",             brand:"Apple",    storage:"64GB",  color:"وردي",       condition:"new", category:"tablet", cost:1300, price:1549},
            {imei:"359871220045135", model:"Galaxy Tab S9",       brand:"Samsung",  storage:"256GB", color:"رمادي",      condition:"new", category:"tablet", cost:2600, price:2999},
            {imei:"SN-MBA13-4501",   model:"MacBook Air 13 M3",   brand:"Apple",    storage:"256GB", color:"فضي",        condition:"new", category:"laptop", cost:4200, price:4699},
            {imei:"SN-MBP14-4502",   model:"MacBook Pro 14 M4",   brand:"Apple",    storage:"512GB", color:"أسود فلكي",  condition:"new", category:"laptop", cost:6900, price:7699},
            {imei:"SN-XPS13-4503",   model:"Dell XPS 13",         brand:"Dell",     storage:"512GB", color:"فضي",        condition:"new", category:"laptop", cost:3900, price:4399},
            {imei:"SN-IDP5-4504",    model:"Lenovo IdeaPad Slim 5", brand:"Lenovo", storage:"512GB", color:"رمادي",      condition:"new", category:"laptop", cost:1900, price:2249},
            {imei:"SN-HPP15-4505",   model:"HP Pavilion 15",      brand:"HP",       storage:"512GB", color:"أزرق",       condition:"new", category:"laptop", cost:2100, price:2449},
            {imei:"SN-EOSR50-4506",  model:"Canon EOS R50",       brand:"Canon",    storage:null,    color:"أسود",       condition:"new", category:"camera", cost:2500, price:2899},
            {imei:"SN-ZV1F-4507",    model:"Sony ZV-1F",          brand:"Sony",     storage:null,    color:"أسود",       condition:"new", category:"camera", cost:1700, price:1999},
            {imei:"SN-HERO12-4508",  model:"GoPro Hero 12",       brand:"GoPro",    storage:null,    color:"أسود",       condition:"new", category:"camera", cost:1350, price:1599},
            {imei:"SN-INST3-4509",   model:"Insta360 GO 3S",      brand:"Insta360", storage:null,    color:"أبيض",       condition:"new", category:"camera", cost:1200, price:1449}
          ]' > devices-base.json

          jq -n '[
            {sku:"ACC-009", name:"بطارية iPhone 13 أصلية",      brand:"Apple",  category:"بطاريات",     cost:120, price:189, quantity:25, min_quantity:5},
            {sku:"ACC-010", name:"بطارية Galaxy S22 أصلية",     brand:"Samsung",category:"بطاريات",     cost:100, price:159, quantity:20, min_quantity:5},
            {sku:"ACC-011", name:"باور بانك Anker 20000mAh",    brand:"Anker",  category:"باور بانك",   cost:180, price:249, quantity:18, min_quantity:4},
            {sku:"ACC-012", name:"باور بانك شاومي 10000mAh",    brand:"Xiaomi", category:"باور بانك",   cost:90,  price:129, quantity:30, min_quantity:6},
            {sku:"ACC-013", name:"بطارية لابتوب HP أصلية",      brand:"HP",     category:"بطاريات",     cost:220, price:299, quantity:10, min_quantity:3}
          ]' > accessories-base.json

          FAILED=0

          echo "== seed cashier-code merchant =="
          SESSION=$(curl -sS "$SUPA/functions/v1/login-by-code" \
            -H "apikey: $ANON" -H "Authorization: Bearer $ANON" \
            -H "Content-Type: application/json" -d '{"code":"70035"}')
          TOKEN=$(echo "$SESSION" | jq -r '.session.access_token // empty')
          if [ -n "$TOKEN" ]; then
            seed_merchant "$TOKEN" "cashier-70035" || FAILED=1
          else
            echo "[cashier-70035] login failed: $SESSION"; FAILED=1
          fi

          echo "== seed demo merchants =="
          for EMAIL in demo-basic@wasil.demo demo-professional@wasil.demo demo-enterprise@wasil.demo demo-distributor@wasil.demo; do
            AUTH=$(curl -sS "$SUPA/auth/v1/token?grant_type=password" \
              -H "apikey: $ANON" -H "Content-Type: application/json" \
              -d "{\"email\":\"$EMAIL\",\"password\":\"demo1234\"}")
            TOKEN=$(echo "$AUTH" | jq -r '.access_token // empty')
            if [ -n "$TOKEN" ]; then
              seed_merchant "$TOKEN" "$EMAIL" || FAILED=1
            else
              echo "[$EMAIL] login failed: $(echo "$AUTH" | jq -c '{error, error_description, msg}')"; FAILED=1
            fi
          done

          exit $FAILED
