name: Seed today demo sales

on:
  workflow_dispatch:

jobs:
  seed:
    runs-on: ubuntu-latest
    steps:
      - name: Insert sales dated today
        env:
          SUPA: https://ynwddyxzypbcftlevuam.supabase.co
          ANON: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inlud2RkeXh6eXBiY2Z0bGV2dWFtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njk5MjE1OTQsImV4cCI6MjA4NTQ5NzU5NH0.PsNDqovuzo7NmTiwsH4swskkIF3FdMlBXjYUy3MJkyA
        run: |
          set -euo pipefail

          seed_merchant() {
            local TOKEN="$1" LABEL="$2"

            local BR MID BID
            BR=$(curl -sS "$SUPA/rest/v1/branches?select=id,merchant_id&is_active=eq.true&limit=1" \
              -H "apikey: $ANON" -H "Authorization: Bearer $TOKEN")
            MID=$(echo "$BR" | jq -r '.[0].merchant_id // empty')
            BID=$(echo "$BR" | jq -r '.[0].id // empty')
            [ -n "$MID" ] || { echo "[$LABEL] no branch"; return 1; }

            local EXIST
            EXIST=$(curl -sS "$SUPA/rest/v1/sales?invoice_number=eq.DEMO-T001&select=id&limit=1" \
              -H "apikey: $ANON" -H "Authorization: Bearer $TOKEN")
            if [ "$(echo "$EXIST" | jq 'length')" != "0" ]; then
              echo "[$LABEL] today sales already present"
              return 0
            fi

            local SALES CREATED
            SALES=$(jq -n --arg m "$MID" --arg b "$BID" '
              def mk(i; hoursAgo; total; method; name):
                { merchant_id:$m, branch_id:$b,
                  invoice_number:("DEMO-T" + (i|tostring|("00"+.)|.[-3:])),
                  customer_name:name,
                  subtotal:((total/1.15*100|round)/100),
                  tax_amount:(((total-total/1.15)*100|round)/100),
                  discount_amount:0, total_amount:total,
                  payment_method:method, payment_status:"paid",
                  sale_date:((now-hoursAgo*3600)|todate),
                  created_at:((now-hoursAgo*3600)|todate) };
              [
                mk(1; 7; 4799; "card";          "بندر الدوسري"),
                mk(2; 6; 235;  "cash";          null),
                mk(3; 6; 1349; "card";          "ماجد العنزي"),
                mk(4; 5; 680;  "cash";          null),
                mk(5; 4; 2299; "bank_transfer"; "شركة الاتصال"),
                mk(6; 3; 105;  "cash";          null),
                mk(7; 2; 3399; "card";          "خالد المطيري"),
                mk(8; 1; 550;  "cash";          null)
              ]')
            CREATED=$(curl -sS -X POST "$SUPA/rest/v1/sales?select=id" \
              -H "apikey: $ANON" -H "Authorization: Bearer $TOKEN" \
              -H "Content-Type: application/json" -H "Prefer: return=representation" \
              --data "$SALES")
            if [ "$(echo "$CREATED" | jq 'if type=="array" then length else -1 end')" = "-1" ]; then
              echo "[$LABEL] sales failed: $CREATED"; return 1
            fi
            echo "[$LABEL] inserted $(echo "$CREATED" | jq 'length') sales for today"

            # Line items: first sale gets a device, the rest get accessories
            local ACCS DEVS ITEMS IRESP
            ACCS=$(curl -sS "$SUPA/rest/v1/accessories?select=id,price,cost&limit=8" \
              -H "apikey: $ANON" -H "Authorization: Bearer $TOKEN")
            DEVS=$(curl -sS "$SUPA/rest/v1/devices?select=id,price,cost&limit=1" \
              -H "apikey: $ANON" -H "Authorization: Bearer $TOKEN")
            if [ "$(echo "$ACCS" | jq 'length')" != "0" ]; then
              ITEMS=$(jq -n --argjson sales "$CREATED" --argjson accs "$ACCS" --argjson devs "$DEVS" '
                [ $sales | to_entries[] |
                  if .key == 0 and ($devs | length) > 0 then
                    { sale_id:.value.id, device_id:$devs[0].id, accessory_id:null,
                      quantity:1, unit_price:$devs[0].price, cost_at_sale:$devs[0].cost }
                  else
                    ($accs[.key % ($accs | length)]) as $a |
                    { sale_id:.value.id, device_id:null, accessory_id:$a.id,
                      quantity:(1 + (.key % 2)), unit_price:$a.price, cost_at_sale:$a.cost }
                  end ]')
              IRESP=$(curl -sS -w "\nHTTP %{http_code}" -X POST "$SUPA/rest/v1/sale_items" \
                -H "apikey: $ANON" -H "Authorization: Bearer $TOKEN" \
                -H "Content-Type: application/json" -H "Prefer: return=minimal" \
                --data "$ITEMS")
              echo "[$LABEL] items: $(echo "$IRESP" | tail -1)"
            fi
          }

          FAILED=0
          for EMAIL in demo-basic@wasil.demo demo-professional@wasil.demo demo-enterprise@wasil.demo demo-distributor@wasil.demo; do
            AUTH=$(curl -sS "$SUPA/auth/v1/token?grant_type=password" \
              -H "apikey: $ANON" -H "Content-Type: application/json" \
              -d "{\"email\":\"$EMAIL\",\"password\":\"demo1234\"}")
            TOKEN=$(echo "$AUTH" | jq -r '.access_token // empty')
            if [ -n "$TOKEN" ]; then seed_merchant "$TOKEN" "$EMAIL" || FAILED=1; else echo "[$EMAIL] login failed"; FAILED=1; fi
          done

          exit $FAILED
