name: Seed Alanam demo store

on:
  workflow_dispatch:

jobs:
  seed:
    runs-on: ubuntu-latest
    steps:
      - name: Configure and publish متجر الأنام
        env:
          SUPA: https://ynwddyxzypbcftlevuam.supabase.co
          ANON: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inlud2RkeXh6eXBiY2Z0bGV2dWFtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njk5MjE1OTQsImV4cCI6MjA4NTQ5NzU5NH0.PsNDqovuzo7NmTiwsH4swskkIF3FdMlBXjYUy3MJkyA
        run: |
          set -euo pipefail

          seed_store() {
            local TOKEN="$1" LABEL="$2" SLUG="$3"

            local BR MID
            BR=$(curl -sS "$SUPA/rest/v1/branches?select=merchant_id&limit=1" \
              -H "apikey: $ANON" -H "Authorization: Bearer $TOKEN")
            MID=$(echo "$BR" | jq -r '.[0].merchant_id // empty')
            [ -n "$MID" ] || { echo "[$LABEL] no merchant"; return 1; }

            local BODY RESP
            BODY=$(jq -n --arg m "$MID" --arg slug "$SLUG" '{
              merchant_id: $m,
              slug: $slug,
              store_name: "متجر الأنام",
              description: "وجهتك الأولى للجوالات والإكسسوارات الأصلية — أسعار منافسة وضمان موثوق وشحن سريع لكل مدن المملكة",
              primary_color: "#0f766e",
              secondary_color: "#f59e0b",
              is_published: true,
              shipping_cost: 25,
              free_shipping_threshold: 500,
              whatsapp_number: "0551000000",
              return_policy: "يحق لك استرجاع أو استبدال المنتج خلال 7 أيام من الاستلام بشرط أن يكون بحالته الأصلية مع الفاتورة. الأجهزة المفتوحة تخضع لفحص فني قبل الاسترجاع.",
              theme_id: "modern",
              font_family: "cairo",
              hero_title: "متجر الأنام — كل ما يحتاجه جوالك",
              hero_subtitle: "أحدث الأجهزة والإكسسوارات الأصلية بأفضل الأسعار، مع ضمان وشحن سريع",
              featured_section_enabled: true,
              seo_title: "متجر الأنام | جوالات وإكسسوارات أصلية",
              seo_description: "تسوق أحدث الجوالات والإكسسوارات الأصلية من متجر الأنام — أسعار منافسة، ضمان موثوق، وشحن سريع لكل مدن المملكة.",
              seo_keywords: "جوالات، ايفون، سامسونج، اكسسوارات، متجر الأنام",
              currency_symbol: "ر.س",
              announcement_bar_text: "🚚 شحن مجاني للطلبات فوق 500 ر.س — لفترة محدودة!",
              announcement_bar_enabled: true
            }')
            RESP=$(curl -sS -w "\nHTTP %{http_code}" -X POST \
              "$SUPA/rest/v1/store_settings?on_conflict=merchant_id" \
              -H "apikey: $ANON" -H "Authorization: Bearer $TOKEN" \
              -H "Content-Type: application/json" \
              -H "Prefer: resolution=merge-duplicates,return=minimal" \
              --data "$BODY")
            echo "[$LABEL] store ($SLUG): $(echo "$RESP" | tail -1)"
            echo "$RESP" | grep -qE "HTTP 20[01]" || { echo "[$LABEL] failed: $RESP"; return 1; }
          }

          FAILED=0
          i=0
          for EMAIL in demo-basic@wasil.demo demo-professional@wasil.demo demo-enterprise@wasil.demo demo-distributor@wasil.demo; do
            i=$((i+1))
            case $i in
              1) SLUG="alanam";;
              2) SLUG="alanam-plus";;
              3) SLUG="alanam-pro";;
              4) SLUG="alanam-max";;
            esac
            AUTH=$(curl -sS "$SUPA/auth/v1/token?grant_type=password" \
              -H "apikey: $ANON" -H "Content-Type: application/json" \
              -d "{\"email\":\"$EMAIL\",\"password\":\"demo1234\"}")
            TOKEN=$(echo "$AUTH" | jq -r '.access_token // empty')
            if [ -n "$TOKEN" ]; then seed_store "$TOKEN" "$EMAIL" "$SLUG" || FAILED=1; else echo "[$EMAIL] login failed"; FAILED=1; fi
          done

          exit $FAILED
