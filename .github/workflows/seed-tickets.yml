name: Seed demo support tickets

on:
  workflow_dispatch:

jobs:
  seed:
    runs-on: ubuntu-latest
    steps:
      - name: Insert demo support tickets
        env:
          SUPA: https://ynwddyxzypbcftlevuam.supabase.co
          ANON: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inlud2RkeXh6eXBiY2Z0bGV2dWFtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njk5MjE1OTQsImV4cCI6MjA4NTQ5NzU5NH0.PsNDqovuzo7NmTiwsH4swskkIF3FdMlBXjYUy3MJkyA
        run: |
          set -euo pipefail

          seed_merchant() {
            local TOKEN="$1" LABEL="$2"

            local BR MID UID
            BR=$(curl -sS "$SUPA/rest/v1/branches?select=merchant_id&limit=1" \
              -H "apikey: $ANON" -H "Authorization: Bearer $TOKEN")
            MID=$(echo "$BR" | jq -r '.[0].merchant_id // empty')
            UID=$(curl -sS "$SUPA/auth/v1/user" -H "apikey: $ANON" -H "Authorization: Bearer $TOKEN" | jq -r '.id // empty')
            { [ -n "$MID" ] && [ -n "$UID" ]; } || { echo "[$LABEL] no merchant/user"; return 1; }

            local EXIST
            EXIST=$(curl -sS "$SUPA/rest/v1/support_tickets?select=id&limit=1" \
              -H "apikey: $ANON" -H "Authorization: Bearer $TOKEN")
            if [ "$(echo "$EXIST" | jq 'length')" != "0" ]; then
              echo "[$LABEL] tickets already present"
              return 0
            fi

            local TICKETS RESP
            TICKETS=$(jq -n --arg m "$MID" --arg u "$UID" '[
              {subject:"مشكلة في طباعة الفاتورة الحرارية",
               description:"عند إتمام البيع لا تطبع الطابعة الحرارية الفاتورة رغم أنها متصلة وتعمل مع برامج أخرى. الطابعة نوع Xprinter XP-80.",
               status:"open", priority:"high", admin_reply:null, replied_at:null,
               created_at:((now-3600*5)|todate), updated_at:((now-3600*5)|todate)},
              {subject:"طلب إضافة مستخدم كاشير جديد",
               description:"أحتاج إضافة كاشير جديد للفرع الثاني مع صلاحيات نقطة البيع فقط، ولم أجد الخيار في صفحة المستخدمين.",
               status:"in_progress", priority:"normal", admin_reply:null, replied_at:null,
               created_at:((now-86400)|todate), updated_at:((now-3600*8)|todate)},
              {subject:"استفسار عن ترقية الباقة",
               description:"أرغب بالترقية من باقة بلس إلى برو، هل تُحتسب الأيام المتبقية من اشتراكي الحالي؟",
               status:"resolved", priority:"low",
               admin_reply:"أهلاً بك! نعم، عند الترقية تُخصم قيمة الأيام المتبقية من باقتك الحالية تلقائياً من سعر الباقة الجديدة. يمكنك طلب الترقية من صفحة الباقات والاشتراك وسيتواصل معك فريق المبيعات لإتمامها.",
               replied_at:((now-86400*2)|todate),
               created_at:((now-86400*3)|todate), updated_at:((now-86400*2)|todate)},
              {subject:"رمز QR لا يظهر في الفاتورة",
               description:"بعض الفواتير يظهر فيها رمز الهيئة وبعضها لا يظهر.",
               status:"closed", priority:"normal",
               admin_reply:"تم حل المشكلة — كان السبب عدم تعبئة الرقم الضريبي في الإعدادات. بعد إضافته أصبح الرمز يظهر في جميع الفواتير.",
               replied_at:((now-86400*6)|todate),
               created_at:((now-86400*7)|todate), updated_at:((now-86400*6)|todate)}
            ] | map(. + {merchant_id:$m, created_by:$u, replied_by:null})')
            RESP=$(curl -sS -w "\nHTTP %{http_code}" -X POST "$SUPA/rest/v1/support_tickets" \
              -H "apikey: $ANON" -H "Authorization: Bearer $TOKEN" \
              -H "Content-Type: application/json" -H "Prefer: return=minimal" \
              --data "$TICKETS")
            echo "[$LABEL] tickets: $(echo "$RESP" | tail -1)"
            echo "$RESP" | grep -q "HTTP 201" || { echo "[$LABEL] insert failed: $RESP"; return 1; }
          }

          FAILED=0
          for EMAIL in demo-basic@wasil.demo demo-professional@wasil.demo demo-enterprise@wasil.demo demo-distributor@wasil.demo; do
            AUTH=$(curl -sS "$SUPA/auth/v1/token?grant_type=password" \
              -H "apikey: $ANON" -H "Content-Type: application/json" \
              -d "{\"email\":\"$EMAIL\",\"password\":\"demo1234\"}")
            TOKEN=$(echo "$AUTH" | jq -r '.access_token // empty')
            if [ -n "$TOKEN" ]; then seed_merchant "$TOKEN" "$EMAIL" || FAILED=1; else echo "[$EMAIL] login failed"; FAILED=1; fi
          done

          exit $FAILED
