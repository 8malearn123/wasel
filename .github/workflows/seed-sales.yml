name: Seed demo sales

on:
  workflow_dispatch:

jobs:
  seed:
    runs-on: ubuntu-latest
    steps:
      - name: Insert demo sales via Supabase REST
        env:
          SUPA: https://ynwddyxzypbcftlevuam.supabase.co
          ANON: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inlud2RkeXh6eXBiY2Z0bGV2dWFtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njk5MjE1OTQsImV4cCI6MjA4NTQ5NzU5NH0.PsNDqovuzo7NmTiwsH4swskkIF3FdMlBXjYUy3MJkyA
        run: |
          set -euo pipefail

          seed_merchant() {
            local TOKEN="$1" LABEL="$2"

            # Skip if demo sales already exist for this merchant
            local EXISTING
            EXISTING=$(curl -sS "$SUPA/rest/v1/sales?invoice_number=eq.DEMO-0001&select=id&limit=1" \
              -H "apikey: $ANON" -H "Authorization: Bearer $TOKEN")
            if [ "$(echo "$EXISTING" | jq 'length')" != "0" ]; then
              echo "[$LABEL] demo sales already seeded — skipping"
              return 0
            fi

            local BR MID BID
            BR=$(curl -sS "$SUPA/rest/v1/branches?select=id,merchant_id&is_active=eq.true&limit=1" \
              -H "apikey: $ANON" -H "Authorization: Bearer $TOKEN")
            MID=$(echo "$BR" | jq -r '.[0].merchant_id // empty')
            BID=$(echo "$BR" | jq -r '.[0].id // empty')
            [ -n "$MID" ] || { echo "[$LABEL] no branch"; return 1; }

            local ACCS
            ACCS=$(curl -sS "$SUPA/rest/v1/accessories?select=id,price,cost&limit=8" \
              -H "apikey: $ANON" -H "Authorization: Bearer $TOKEN")

            # 24 invoices spread across the last 7 days (totals are VAT-inclusive)
            local SALES
            SALES=$(jq -n --arg m "$MID" --arg b "$BID" '
              def mk(i; day; hour; total; method; status; name):
                { merchant_id: $m, branch_id: $b,
                  invoice_number: ("DEMO-" + (i | tostring | ("0000" + .) | .[-4:])),
                  customer_name: name,
                  subtotal: ((total / 1.15 * 100 | round) / 100),
                  tax_amount: ((total - total / 1.15) * 100 | round / 100),
                  discount_amount: 0,
                  total_amount: total,
                  payment_method: method, payment_status: status,
                  sale_date: ((now - day*86400 - hour*3600) | todate),
                  created_at: ((now - day*86400 - hour*3600) | todate) };
              [
                mk(1; 0; 2;  4799; "card"; "paid"; "سالم العتيبي"),
                mk(2; 0; 4;   235; "cash"; "paid"; null),
                mk(3; 0; 6;  1899; "cash"; "paid"; "أحمد الزهراني"),
                mk(4; 0; 8;   130; "card"; "paid"; null),
                mk(5; 1; 3;  3399; "card"; "paid"; "خالد المطيري"),
                mk(6; 1; 5;   680; "cash"; "paid"; null),
                mk(7; 1; 7;    75; "cash"; "paid"; null),
                mk(8; 1; 9;  2299; "bank_transfer"; "paid"; "شركة الاتصال"),
                mk(9; 2; 2;  4599; "card"; "paid"; "فهد القحطاني"),
                mk(10; 2; 4;   550; "cash"; "paid"; null),
                mk(11; 2; 6;   105; "cash"; "paid"; null),
                mk(12; 2; 8;  1349; "card"; "unpaid"; "مؤسسة النور"),
                mk(13; 3; 3;  3899; "card"; "paid"; "عبدالله الشمري"),
                mk(14; 3; 5;   165; "cash"; "paid"; null),
                mk(15; 3; 7;  1599; "mixed"; "paid"; "سعود الحربي"),
                mk(16; 4; 2;  2599; "card"; "paid"; "ماجد العنزي"),
                mk(17; 4; 4;    60; "cash"; "paid"; null),
                mk(18; 4; 6;   785; "cash"; "paid"; null),
                mk(19; 5; 3;  3599; "bank_transfer"; "paid"; "مكتب الأفق"),
                mk(20; 5; 5;   130; "cash"; "paid"; null),
                mk(21; 5; 7;  1899; "card"; "unpaid"; "نايف السبيعي"),
                mk(22; 6; 2;  4799; "card"; "paid"; "بندر الدوسري"),
                mk(23; 6; 4;   310; "cash"; "paid"; null),
                mk(24; 6; 6;   550; "cash"; "paid"; null)
              ]')

            local CREATED
            CREATED=$(curl -sS -X POST "$SUPA/rest/v1/sales?select=id" \
              -H "apikey: $ANON" -H "Authorization: Bearer $TOKEN" \
              -H "Content-Type: application/json" -H "Prefer: return=representation" \
              --data "$SALES")
            local COUNT
            COUNT=$(echo "$CREATED" | jq 'if type=="array" then length else -1 end')
            if [ "$COUNT" = "-1" ]; then echo "[$LABEL] sales insert failed: $CREATED"; return 1; fi
            echo "[$LABEL] inserted $COUNT sales"

            # Attach 1-2 accessory line items per sale (round-robin)
            local ITEMS
            ITEMS=$(jq -n --argjson sales "$CREATED" --argjson accs "$ACCS" '
              [ $sales | to_entries[] |
                . as $e |
                ($accs[$e.key % ($accs | length)]) as $a |
                { sale_id: $e.value.id, accessory_id: $a.id,
                  quantity: (1 + ($e.key % 2)),
                  unit_price: $a.price, cost_at_sale: $a.cost } ]')
            local IRESP
            IRESP=$(curl -sS -w "\nHTTP %{http_code}" -X POST "$SUPA/rest/v1/sale_items" \
              -H "apikey: $ANON" -H "Authorization: Bearer $TOKEN" \
              -H "Content-Type: application/json" -H "Prefer: return=minimal" \
              --data "$ITEMS")
            echo "[$LABEL] items: $(echo "$IRESP" | tail -1)"
          }

          FAILED=0

          SESSION=$(curl -sS "$SUPA/functions/v1/login-by-code" \
            -H "apikey: $ANON" -H "Authorization: Bearer $ANON" \
            -H "Content-Type: application/json" -d '{"code":"70035"}')
          TOKEN=$(echo "$SESSION" | jq -r '.session.access_token // empty')
          if [ -n "$TOKEN" ]; then seed_merchant "$TOKEN" "cashier-70035" || FAILED=1; else echo "cashier login failed"; FAILED=1; fi

          for EMAIL in demo-basic@wasil.demo demo-professional@wasil.demo demo-enterprise@wasil.demo demo-distributor@wasil.demo; do
            AUTH=$(curl -sS "$SUPA/auth/v1/token?grant_type=password" \
              -H "apikey: $ANON" -H "Content-Type: application/json" \
              -d "{\"email\":\"$EMAIL\",\"password\":\"demo1234\"}")
            TOKEN=$(echo "$AUTH" | jq -r '.access_token // empty')
            if [ -n "$TOKEN" ]; then seed_merchant "$TOKEN" "$EMAIL" || FAILED=1; else echo "[$EMAIL] login failed"; FAILED=1; fi
          done

          exit $FAILED
