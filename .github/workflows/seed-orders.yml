name: Seed demo online orders

on:
  workflow_dispatch:

jobs:
  seed:
    runs-on: ubuntu-latest
    steps:
      - name: Insert demo online orders
        env:
          SUPA: https://ynwddyxzypbcftlevuam.supabase.co
          ANON: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inlud2RkeXh6eXBiY2Z0bGV2dWFtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njk5MjE1OTQsImV4cCI6MjA4NTQ5NzU5NH0.PsNDqovuzo7NmTiwsH4swskkIF3FdMlBXjYUy3MJkyA
        run: |
          set -euo pipefail

          seed_merchant() {
            local TOKEN="$1" LABEL="$2"

            local BR MID
            BR=$(curl -sS "$SUPA/rest/v1/branches?select=merchant_id&limit=1" \
              -H "apikey: $ANON" -H "Authorization: Bearer $TOKEN")
            MID=$(echo "$BR" | jq -r '.[0].merchant_id // empty')
            [ -n "$MID" ] || { echo "[$LABEL] no merchant"; return 1; }

            local EXIST
            EXIST=$(curl -sS "$SUPA/rest/v1/online_orders?order_number=eq.ON-DEMO-001&select=id&limit=1" \
              -H "apikey: $ANON" -H "Authorization: Bearer $TOKEN")
            if [ "$(echo "$EXIST" | jq 'length')" != "0" ]; then
              echo "[$LABEL] online orders already present"
              return 0
            fi

            local ORDERS CREATED
            ORDERS=$(jq -n --arg m "$MID" '
              def mk(i; day; st; pay; total; ship; prov; trk; name; phone; city; addr):
                { merchant_id:$m,
                  order_number:("ON-DEMO-" + (i|tostring|("000"+.)|.[-3:])),
                  status:st, customer_name:name, customer_phone:phone, customer_email:null,
                  shipping_address:addr, shipping_city:city,
                  shipping_provider:prov, tracking_number:trk, shipping_cost:ship,
                  payment_method:"bank_transfer", payment_status:pay, payment_reference:null,
                  subtotal:((total/1.15*100|round)/100), tax_amount:(((total-total/1.15)*100|round)/100),
                  discount_amount:0, total_amount:total, notes:null,
                  created_at:((now-day*86400)|todate), updated_at:((now-day*86400)|todate) };
              [
                mk(1; 0; "pending";    "unpaid"; 736;  25; null;     null;        "نورة السالم";   "0554443332"; "الرياض"; "حي النرجس، شارع الأمير محمد"),
                mk(2; 0; "confirmed";  "paid";   1954; 25; null;     null;        "راكان العمري";  "0501112223"; "جدة";    "حي الشاطئ، طريق الكورنيش"),
                mk(3; 1; "processing"; "paid";   680;  15; null;     null;        "لمى الحارثي";   "0567778889"; "الدمام"; "حي الفيصلية"),
                mk(4; 2; "shipped";    "paid";   3424; 25; "smsa";   "SM12094857","تركي الشهراني"; "0533334445"; "الرياض"; "حي الياسمين"),
                mk(5; 4; "delivered";  "paid";   205;  15; "aramex"; "AR55012938","هند القرني";    "0545556667"; "مكة";    "حي العزيزية"),
                mk(6; 5; "cancelled";  "unpaid"; 550;  25; null;     null;        "زياد المالكي";  "0578889990"; "الخبر";  "حي العقربية")
              ]')
            CREATED=$(curl -sS -X POST "$SUPA/rest/v1/online_orders?select=id,order_number" \
              -H "apikey: $ANON" -H "Authorization: Bearer $TOKEN" \
              -H "Content-Type: application/json" -H "Prefer: return=representation" \
              --data "$ORDERS")
            if [ "$(echo "$CREATED" | jq 'if type=="array" then length else -1 end')" = "-1" ]; then
              echo "[$LABEL] orders failed: $CREATED"; return 1
            fi
            echo "[$LABEL] inserted $(echo "$CREATED" | jq 'length') online orders"

            # Line items referencing real accessories
            local ACCS ITEMS IRESP
            ACCS=$(curl -sS "$SUPA/rest/v1/accessories?select=id,name,price&limit=8" \
              -H "apikey: $ANON" -H "Authorization: Bearer $TOKEN")
            if [ "$(echo "$ACCS" | jq 'length')" != "0" ]; then
              ITEMS=$(jq -n --argjson ords "$CREATED" --argjson accs "$ACCS" '
                [ $ords | to_entries[] |
                  ($accs[.key % ($accs | length)]) as $a |
                  { order_id:.value.id, accessory_id:$a.id, device_id:null,
                    item_name:$a.name, item_image:null,
                    quantity:(1 + (.key % 2)), unit_price:$a.price } ]')
              IRESP=$(curl -sS -w "\nHTTP %{http_code}" -X POST "$SUPA/rest/v1/online_order_items" \
                -H "apikey: $ANON" -H "Authorization: Bearer $TOKEN" \
                -H "Content-Type: application/json" -H "Prefer: return=minimal" \
                --data "$ITEMS")
              echo "[$LABEL] items: $(echo "$IRESP" | tail -1)"
            fi
          }

          FAILED=0
          for EMAIL in demo-basic@wasil.demo demo-professional@wasil.demo demo-enterprise@wasil.demo demo-distributor@wasil.demo; do
            AUTH=$(curl -sS "$SUPA/auth/v1/token?grant_type=password" \
              -H "apikey: $ANON" -H "Content-Type: application/json" \
              -d "{\"email\":\"$EMAIL\",\"password\":\"demo1234\"}")
            TOKEN=$(echo "$AUTH" | jq -r '.access_token // empty')
            if [ -n "$TOKEN" ]; then seed_merchant "$TOKEN" "$EMAIL" || FAILED=1; else echo "[$EMAIL] login failed"; FAILED=1; fi
          done

          exit $FAILED
