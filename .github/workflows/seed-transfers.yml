name: Seed demo transfers

on:
  workflow_dispatch:

jobs:
  seed:
    runs-on: ubuntu-latest
    steps:
      - name: Insert demo branches and stock transfers
        env:
          SUPA: https://ynwddyxzypbcftlevuam.supabase.co
          ANON: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inlud2RkeXh6eXBiY2Z0bGV2dWFtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njk5MjE1OTQsImV4cCI6MjA4NTQ5NzU5NH0.PsNDqovuzo7NmTiwsH4swskkIF3FdMlBXjYUy3MJkyA
        run: |
          set -euo pipefail

          seed_merchant() {
            local TOKEN="$1" LABEL="$2"

            local BRS MID
            BRS=$(curl -sS "$SUPA/rest/v1/branches?select=id,merchant_id,name&is_active=eq.true&order=created_at" \
              -H "apikey: $ANON" -H "Authorization: Bearer $TOKEN")
            MID=$(echo "$BRS" | jq -r '.[0].merchant_id // empty')
            [ -n "$MID" ] || { echo "[$LABEL] no branch"; return 1; }

            # Ensure a second branch exists for transfers
            if [ "$(echo "$BRS" | jq 'length')" -lt 2 ]; then
              curl -sS -X POST "$SUPA/rest/v1/branches" \
                -H "apikey: $ANON" -H "Authorization: Bearer $TOKEN" \
                -H "Content-Type: application/json" -H "Prefer: return=minimal" \
                --data "$(jq -n --arg m "$MID" '[{merchant_id:$m, name:"فرع العليا", is_active:true, is_warehouse:false}]')" > /dev/null
              BRS=$(curl -sS "$SUPA/rest/v1/branches?select=id,merchant_id,name&is_active=eq.true&order=created_at" \
                -H "apikey: $ANON" -H "Authorization: Bearer $TOKEN")
              echo "[$LABEL] created second branch"
            fi
            local B1 B2
            B1=$(echo "$BRS" | jq -r '.[0].id')
            B2=$(echo "$BRS" | jq -r '.[1].id')

            # Skip when demo transfers already exist
            local TEXIST
            TEXIST=$(curl -sS "$SUPA/rest/v1/stock_transfers?transfer_number=eq.TR-DEMO-001&select=id&limit=1" \
              -H "apikey: $ANON" -H "Authorization: Bearer $TOKEN")
            if [ "$(echo "$TEXIST" | jq 'length')" != "0" ]; then
              echo "[$LABEL] transfers already present"
              return 0
            fi

            local TRS CREATED
            TRS=$(jq -n --arg m "$MID" --arg b1 "$B1" --arg b2 "$B2" '[
              {merchant_id:$m, transfer_number:"TR-DEMO-001", from_branch_id:$b1, to_branch_id:$b2, status:"received",
               notes:"تزويد فرع العليا بإكسسوارات", dispatched_at:((now-4*86400)|todate), received_at:((now-3*86400)|todate), created_at:((now-5*86400)|todate)},
              {merchant_id:$m, transfer_number:"TR-DEMO-002", from_branch_id:$b2, to_branch_id:$b1, status:"dispatched",
               notes:"إرجاع أجهزة للفرع الرئيسي", dispatched_at:((now-1*86400)|todate), received_at:null, created_at:((now-2*86400)|todate)},
              {merchant_id:$m, transfer_number:"TR-DEMO-003", from_branch_id:$b1, to_branch_id:$b2, status:"pending",
               notes:"طلب شواحن وسماعات", dispatched_at:null, received_at:null, created_at:((now-3600)|todate)}
            ]')
            CREATED=$(curl -sS -X POST "$SUPA/rest/v1/stock_transfers?select=id" \
              -H "apikey: $ANON" -H "Authorization: Bearer $TOKEN" \
              -H "Content-Type: application/json" -H "Prefer: return=representation" \
              --data "$TRS")
            if [ "$(echo "$CREATED" | jq 'if type=="array" then length else -1 end')" = "-1" ]; then
              echo "[$LABEL] transfers failed: $CREATED"; return 1
            fi
            echo "[$LABEL] inserted $(echo "$CREATED" | jq 'length') transfers"

            # Attach accessory items to each transfer
            local ACCS ITEMS IRESP
            ACCS=$(curl -sS "$SUPA/rest/v1/accessories?select=id&limit=6" \
              -H "apikey: $ANON" -H "Authorization: Bearer $TOKEN")
            if [ "$(echo "$ACCS" | jq 'length')" != "0" ]; then
              ITEMS=$(jq -n --argjson trs "$CREATED" --argjson accs "$ACCS" '
                [ $trs | to_entries[] |
                  ($accs[.key % ($accs | length)]) as $a |
                  { transfer_id: .value.id, accessory_id: $a.id, quantity: (2 + .key) } ]')
              IRESP=$(curl -sS -w "\nHTTP %{http_code}" -X POST "$SUPA/rest/v1/stock_transfer_items" \
                -H "apikey: $ANON" -H "Authorization: Bearer $TOKEN" \
                -H "Content-Type: application/json" -H "Prefer: return=minimal" \
                --data "$ITEMS")
              echo "[$LABEL] items: $(echo "$IRESP" | tail -1)"
            fi
          }

          FAILED=0
          for EMAIL in demo-basic@wasil.demo demo-professional@wasil.demo demo-enterprise@wasil.demo demo-distributor@wasil.demo; do
            AUTH=$(curl -sS "$SUPA/auth/v1/token?grant_type=password" \
              -H "apikey: $ANON" -H "Content-Type: application/json" \
              -d "{\"email\":\"$EMAIL\",\"password\":\"demo1234\"}")
            TOKEN=$(echo "$AUTH" | jq -r '.access_token // empty')
            if [ -n "$TOKEN" ]; then seed_merchant "$TOKEN" "$EMAIL" || FAILED=1; else echo "[$EMAIL] login failed"; FAILED=1; fi
          done

          exit $FAILED
